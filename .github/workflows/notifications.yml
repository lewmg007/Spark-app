name: Spark Notifications

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Also lets you trigger it manually from GitHub

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Send water reminders
        run: |
          node << 'SCRIPT'
          const https = require('https');

          // Firebase project details
          const PROJECT_ID = 'spark-app-a98fa';
          const SERVICE_ACCOUNT = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);

          // Get Firebase access token using service account
          async function getAccessToken() {
            const { GoogleAuth } = require('google-auth-library');
            const auth = new GoogleAuth({
              credentials: SERVICE_ACCOUNT,
              scopes: ['https://www.googleapis.com/auth/firebase.messaging', 
                       'https://www.googleapis.com/auth/datastore'],
            });
            const client = await auth.getClient();
            const token = await client.getAccessToken();
            return token.token;
          }

          async function getFirestoreData(token) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'firestore.googleapis.com',
                path: `/v1/projects/${PROJECT_ID}/databases/(default)/documents/couples`,
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
              };
              let data = '';
              const req = https.request(options, (res) => {
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.end();
            });
          }

          async function sendFCM(token, title, body, accessToken) {
            return new Promise((resolve) => {
              const message = JSON.stringify({
                message: {
                  token,
                  notification: { title, body },
                  webpush: {
                    notification: {
                      title, body,
                      icon: 'https://spark-app.netlify.app/icon-192.png',
                      badge: 'https://spark-app.netlify.app/icon-192.png',
                      vibrate: [100, 50, 100],
                    }
                  }
                }
              });
              const options = {
                hostname: 'fcm.googleapis.com',
                path: `/v1/projects/${PROJECT_ID}/messages:send`,
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${accessToken}`,
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(message)
                }
              };
              let data = '';
              const req = https.request(options, (res) => {
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              });
              req.on('error', () => resolve(null));
              req.write(message);
              req.end();
            });
          }

          async function main() {
            try {
              const { execSync } = require('child_process');
              execSync('npm install google-auth-library --no-save', { stdio: 'inherit' });
              
              const token = await getAccessToken();
              const couples = await getFirestoreData(token);
              const now = Date.now();
              const hour = new Date().getUTCHours();
              let sent = 0;

              if (!couples.documents) {
                console.log('No couples found');
                return;
              }

              for (const doc of couples.documents) {
                const fields = doc.fields || {};
                const fcmTokens = (fields.fcmTokens?.arrayValue?.values || []).map(v => v.stringValue).filter(Boolean);
                if (fcmTokens.length === 0) continue;

                const plant = fields.currentPlant?.mapValue?.fields;
                if (!plant) continue;

                const isAlive = plant.isAlive?.booleanValue;
                const lastWatered = plant.lastWatered?.stringValue;
                const plantName = plant.name?.stringValue || 'your plant';

                if (!isAlive || !lastWatered) continue;

                const hoursSince = (now - new Date(lastWatered).getTime()) / (1000 * 60 * 60);

                let title = null, body = null;

                if (hoursSince >= 20 && hoursSince < 21) {
                  title = `⚠️ ${plantName} needs water urgently!`;
                  body = `Only 4 hours left before ${plantName} dies. Water it now! 💧`;
                } else if (hoursSince >= 15 && hoursSince < 16) {
                  title = `🌿 ${plantName} is getting thirsty`;
                  body = `It's been a while — give ${plantName} some love today 💧`;
                } else if (hour === 9) {
                  // 9am daily question reminder
                  title = '💬 Your daily Spark question is ready';
                  body = 'Open the app and connect with your partner today ✨';
                }

                if (title) {
                  for (const fcmToken of fcmTokens) {
                    await sendFCM(fcmToken, title, body, token);
                    sent++;
                  }
                }
              }
              console.log(`Sent ${sent} notifications`);
            } catch(e) {
              console.error('Error:', e.message);
              process.exit(1);
            }
          }

          main();
          SCRIPT
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}