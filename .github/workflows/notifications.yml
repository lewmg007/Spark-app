name: Spark Notifications

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install google-auth-library node-fetch@2

      - name: Send water reminders
        uses: actions/github-script@v7
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        with:
          script: |
            const { GoogleAuth } = require('google-auth-library');
            const fetch = require('node-fetch');

            const PROJECT_ID = 'spark-app-a98fa';
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);

            // Get access token
            const auth = new GoogleAuth({
              credentials: serviceAccount,
              scopes: [
                'https://www.googleapis.com/auth/firebase.messaging',
                'https://www.googleapis.com/auth/datastore'
              ],
            });
            const client = await auth.getClient();
            const { token } = await client.getAccessToken();

            // Get all couples from Firestore
            const fsRes = await fetch(
              `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/couples`,
              { headers: { Authorization: `Bearer ${token}` } }
            );
            const fsData = await fsRes.json();
            const docs = fsData.documents || [];
            console.log(`Found ${docs.length} couples`);

            const now = Date.now();
            const hour = new Date().getUTCHours();
            let sent = 0;

            for (const doc of docs) {
              const f = doc.fields || {};
              const tokens = (f.fcmTokens?.arrayValue?.values || [])
                .map(v => v.stringValue).filter(Boolean);
              if (!tokens.length) continue;

              const plant = f.currentPlant?.mapValue?.fields;
              const isAlive = plant?.isAlive?.booleanValue;
              const lastWatered = plant?.lastWatered?.stringValue;
              const plantName = plant?.name?.stringValue || 'your plant';

              if (!isAlive || !lastWatered) continue;

              const hoursSince = (now - new Date(lastWatered).getTime()) / 3600000;

              let title = null, body = null;

              if (hoursSince >= 20 && hoursSince < 21) {
                title = `⚠️ ${plantName} needs water urgently!`;
                body = `Only 4 hours left — water it before it dies 💧`;
              } else if (hoursSince >= 15 && hoursSince < 16) {
                title = `🌿 ${plantName} is getting thirsty`;
                body = `Give ${plantName} some love today 💧`;
              } else if (hour === 9) {
                title = '💬 Your daily Spark question is ready';
                body = 'Open the app and connect with your partner ✨';
              }

              if (!title) continue;

              for (const fcmToken of tokens) {
                const res = await fetch(
                  `https://fcm.googleapis.com/v1/projects/${PROJECT_ID}/messages:send`,
                  {
                    method: 'POST',
                    headers: {
                      Authorization: `Bearer ${token}`,
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                      message: {
                        token: fcmToken,
                        notification: { title, body },
                        webpush: {
                          notification: {
                            title, body,
                            icon: 'https://sparkmyapp.netlify.app/icon-192.png',
                            badge: 'https://sparkmyapp.netlify.app/icon-192.png',
                            vibrate: [100, 50, 100],
                          }
                        }
                      }
                    })
                  }
                );
                const result = await res.json();
                if (result.name) {
                  console.log(`Sent to ${fcmToken.slice(0,10)}...`);
                  sent++;
                } else {
                  console.log('FCM error:', JSON.stringify(result));
                }
              }
            }
            console.log(`Total sent: ${sent}`);